<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATOM OPS · Giriş</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8390E;
  --red-dim: rgba(232,57,14,.15);
  --bg: #07080A;
  --surface: #0F1114;
  --border: rgba(255,255,255,.07);
  --text: #E8EAF0;
  --muted: #4A5060;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Figtree',sans-serif;overflow:hidden}

/* Grid background */
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0}

/* Glow */
.glow{position:fixed;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,57,14,.12) 0%,transparent 70%);
  top:-200px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:0}

.container{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

.card{width:100%;max-width:440px}

/* Logo */
.logo-wrap{text-align:center;margin-bottom:40px}
.logo-mark{display:inline-flex;align-items:center;gap:14px;margin-bottom:16px}
.logo-box{width:52px;height:52px;background:var(--red);border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond';font-size:28px;font-weight:700;color:#fff;
  box-shadow:0 8px 32px rgba(232,57,14,.4)}
.logo-text{text-align:left}
.logo-name{font-family:'Cormorant Garamond';font-size:22px;font-weight:600;letter-spacing:.5px}
.logo-sub{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:1px}
.logo-domain{font-size:11px;color:var(--muted);letter-spacing:1px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:6px;padding:4px 12px;display:inline-block}

/* Form card */
.form-card{background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:32px;backdrop-filter:blur(20px)}

.form-title{font-size:20px;font-weight:800;margin-bottom:4px}
.form-sub{font-size:13px;color:var(--muted);margin-bottom:28px}

.field{margin-bottom:16px}
.field-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);margin-bottom:7px;display:block}
.field-input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:12px;padding:13px 16px;color:var(--text);font-family:'Figtree';
  font-size:14px;font-weight:500;outline:none;transition:all .2s}
.field-input:focus{border-color:rgba(232,57,14,.5);background:rgba(232,57,14,.04)}
.field-input::placeholder{color:var(--muted)}

/* Role selector */
.role-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:24px}
.role-btn{padding:10px 8px;border-radius:11px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:'Figtree';font-size:11px;
  font-weight:600;cursor:pointer;transition:all .2s;text-align:center;line-height:1.3}
.role-btn .role-ico{display:block;font-size:18px;margin-bottom:4px}
.role-btn:hover{border-color:rgba(255,255,255,.15);color:var(--text)}
.role-btn.active{border-color:var(--red);background:var(--red-dim);color:#fff}

.login-btn{width:100%;padding:15px;border:none;border-radius:13px;
  background:var(--red);color:#fff;font-family:'Figtree';font-size:15px;
  font-weight:800;cursor:pointer;letter-spacing:.3px;
  box-shadow:0 6px 24px rgba(232,57,14,.35);transition:all .22s;
  display:flex;align-items:center;justify-content:center;gap:8px}
.login-btn:hover{background:#ff4d1a;box-shadow:0 8px 32px rgba(232,57,14,.5);transform:translateY(-1px)}
.login-btn:active{transform:translateY(0)}

/* Error */
.err-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
  border-radius:10px;padding:10px 14px;font-size:12px;color:#FCA5A5;
  margin-bottom:16px;display:none}
.err-msg.show{display:block}

/* Default credentials hint */
.hint{text-align:center;margin-top:20px;font-size:11px;color:var(--muted);line-height:1.7}
.hint strong{color:rgba(255,255,255,.4)}

/* Loading overlay */
.loading-ovl{position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;opacity:0;pointer-events:none;transition:opacity .3s}
.loading-ovl.show{opacity:1;pointer-events:all}
.spin{width:40px;height:40px;border:2px solid var(--border);
  border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-role{font-size:14px;font-weight:600;color:var(--muted)}
</style>
</head>
<body>

<div class="glow"></div>

<div class="container">
  <div class="card">

    <div class="logo-wrap">
      <div class="logo-mark">
        <div class="logo-box">A</div>
        <div class="logo-text">
          <div class="logo-name">ATOM OPS</div>
          <div class="logo-sub">Management Console</div>
        </div>
      </div><br>
      <span class="logo-domain">ops.atomkumpir.com</span>
    </div>

    <div class="form-card">
      <div class="form-title">Giriş Yap</div>
      <div class="form-sub">Rol seçin ve kimlik bilgilerinizi girin</div>

      <!-- Role selector -->
      <div class="role-grid" id="roleGrid">
        <button class="role-btn" data-role="admin" data-url="ops-admin.html" onclick="selectRole(this)">
          <span class="role-ico">🛡️</span>Admin
        </button>
        <button class="role-btn" data-role="patron" data-url="ops-patron.html" onclick="selectRole(this)">
          <span class="role-ico">👑</span>Patron
        </button>
        <button class="role-btn" data-role="super" data-url="ops-super.html" onclick="selectRole(this)">
          <span class="role-ico">📊</span>İşletme
        </button>
        <button class="role-btn" data-role="kitchen" data-url="ops-mutfak.html" onclick="selectRole(this)">
          <span class="role-ico">🍳</span>Mutfak
        </button>
        <button class="role-btn" data-role="waiter" data-url="ops-garson.html" onclick="selectRole(this)">
          <span class="role-ico">🧑‍🍽️</span>Garson
        </button>
        <button class="role-btn" data-role="valet" data-url="ops-vale.html" onclick="selectRole(this)">
          <span class="role-ico">🚗</span>Vale
        </button>
      </div>

      <div class="err-msg" id="errMsg">Kullanıcı adı veya şifre hatalı</div>

      <div class="field">
        <label class="field-label">Kullanıcı Adı</label>
        <input class="field-input" id="username" type="text" placeholder="kullanici.adi" autocomplete="username">
      </div>
      <div class="field">
        <label class="field-label">Şifre</label>
        <input class="field-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="login-btn" onclick="doLogin()">
        <span id="loginBtnTxt">Giriş Yap</span> <span>→</span>
      </button>

      <div class="hint">
        Varsayılan: <strong>admin</strong> / <strong>atom2024</strong><br>
        İlk girişte şifrenizi değiştirin
      </div>
    </div>

  </div>
</div>

<div class="loading-ovl" id="loadingOvl">
  <div class="spin"></div>
  <div class="loading-role" id="loadingRole">Yönlendiriliyor...</div>
</div>

<script>
// Default credentials per role
const USERS = {
  admin:   { user: 'admin',    pass: 'atom2024',   url: 'ops-admin.html',  label: 'Admin Paneli' },
  patron:  { user: 'patron',   pass: 'patron2024', url: 'ops-patron.html', label: 'Patron Ekranı' },
  super:   { user: 'isletme',  pass: 'isletme24',  url: 'ops-super.html',  label: 'İşletme Paneli' },
  kitchen: { user: 'mutfak',   pass: 'mutfak24',   url: 'ops-mutfak.html', label: 'Mutfak Ekranı' },
  waiter:  { user: 'garson',   pass: 'garson24',   url: 'ops-garson.html', label: 'Garson Paneli' },
  valet:   { user: 'vale',     pass: 'vale2024',   url: 'ops-vale.html',   label: 'Vale Paneli' },
};

var selectedRole = null;

function selectRole(btn) {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedRole = btn.dataset.role;
  // Prefill hint
  const cred = USERS[selectedRole];
  if (cred) {
    document.getElementById('username').value = cred.user;
    document.getElementById('password').value = '';
    document.getElementById('password').placeholder = '••••••••';
  }
  document.getElementById('errMsg').classList.remove('show');
}

function doLogin() {
  if (!selectedRole) {
    document.getElementById('errMsg').textContent = 'Lütfen bir rol seçin';
    document.getElementById('errMsg').classList.add('show');
    return;
  }
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  const cred = USERS[selectedRole];

  if (user === cred.user && pass === cred.pass) {
    // Save session
    sessionStorage.setItem('atom_role', selectedRole);
    sessionStorage.setItem('atom_user', user);
    sessionStorage.setItem('atom_label', cred.label);

    // Loading animation
    document.getElementById('loadingRole').textContent = cred.label + ' yükleniyor...';
    document.getElementById('loadingOvl').classList.add('show');

    setTimeout(() => { window.location.href = cred.url; }, 1200);
  } else {
    document.getElementById('errMsg').textContent = 'Kullanıcı adı veya şifre hatalı';
    document.getElementById('errMsg').classList.add('show');
    document.getElementById('password').value = '';
  }
}

// Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Check if already logged in (back button case)
const savedRole = sessionStorage.getItem('atom_role');
if (savedRole && USERS[savedRole]) {
  // Let them re-login, don't auto redirect
}
</script>
</body>
</html>
